<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Datvida LLC dispatch services flyer</title>
  <desc id="desc">A navy, gold, and white dispatch services flyer for Datvida LLC with service details, contact information, and carrier requirements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1080" y1="0" y2="1350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101d"/>
      <stop offset=".52" stop-color="#0d2849"/>
      <stop offset="1" stop-color="#123f78"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ffe08b"/>
      <stop offset=".5" stop-color="#f4b540"/>
      <stop offset="1" stop-color="#c78312"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#25c7f3"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity=".18"/>
    </filter>
    <style>
      .font { font-family: Inter, Arial, Helvetica, sans-serif; }
      .condensed { font-family: Impact, Haettenschweiler, "Arial Black", sans-serif; letter-spacing: 1px; }
      .label { fill: #ffffff; font-size: 42px; }
      .small { fill: rgba(255,255,255,.82); font-size: 28px; font-weight: 800; }
      .body { fill: #ffffff; font-size: 28px; font-weight: 800; }
      .muted { fill: rgba(255,255,255,.82); }
      .navy { fill: #08111f; }
      .goldFill { fill: url(#gold); }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
